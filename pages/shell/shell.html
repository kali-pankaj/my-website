<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shell scripting handbook | Bash reference guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-wrapper">
    <!-- sidebar navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>🐚 Bash<br>Reference</h2>
            <p>essential scripting snippets</p>
        </div>
        <ul class="nav-links" id="navList">
            <!-- dynamically filled from sections -->
        </ul>
    </aside>

    <main class="main-content">
        <div class="hero">
            <h1>📜 shell scripting handbook</h1>
            <p>syntax • variables • loops • functions • advanced tips — practical examples ready to use</p>
        </div>
        <div id="sections-container">
            <!-- content will be injected -->
        </div>
        <footer>
            ⚡ interactive bash reference — click any sidebar topic to jump &nbsp;|&nbsp; mobile friendly sidebar
        </footer>
    </main>
</div>
<button class="sidebar-toggle" id="menuToggleBtn">☰ Menu</button>

<script>
    // Complete dataset with all original topics + bonus advanced concepts
    const sectionsData = [
        { id: "basic-script", title: "1. Basic script & syntax", code: "#!/bin/bash\necho \"Hello, World!\"" },
        { id: "comments", title: "2. Comments", code: "#!/bin/bash\n# This is a single-line comment\n# Best practice: document your logic" },
        { id: "variables", title: "3. Variables", code: "#!/bin/bash\nname=\"ram\"\nage=30\necho \"Hello, $name! You are $age years old.\"\nHOSTNAME=$(hostname)\necho \"Hostname: $HOSTNAME\"" },
        { id: "constants", title: "4. Constant variables", code: "#!/bin/bash\nreadonly college=\"ABC College\"\necho \"Welcome to $college!\"\n# college=\"Other\" -> error" },
        { id: "arrays", title: "5. Arrays (indexed)", code: "#!/bin/bash\nmyarray=(\"apple\" \"banana\" \"cherry\" 1 20 5.5)\necho \"First: ${myarray[0]}\"\necho \"All: ${myarray[@]}\"\necho \"Length: ${#myarray[@]}\"\nmyarray+=(\"new\" \"orange\")\necho \"Updated: ${myarray[@]}\"" },
        { id: "assoc-arrays", title: "6. Key-value arrays", code: "#!/bin/bash\ndeclare -A myarray\nmyarray=([name]=\"ram\" [age]=30 [city]=\"delhi\")\necho \"Name: ${myarray[name]}\"\necho \"Age: ${myarray[age]}\"" },
        { id: "string-ops", title: "7. String operations", code: "#!/bin/bash\nmyvars=\"hey bro how are you ?\"\necho \"Length: ${#myvars}\"\necho \"Uppercase: ${myvars^^}\"\necho \"Lowercase: ${myvars,,}\"\necho \"Replace: ${myvars/how/where}\"\necho \"Slice (4:3): ${myvars:4:3}\"" },
        { id: "user-input", title: "8. User interaction", code: "#!/bin/bash\nread -p \"Enter your name: \" name\necho \"Hello, $name\"\n# silent read for password: read -s -p \"Password: \" pass" },
        { id: "arithmetic", title: "9. Arithmetic ops", code: "#!/bin/bash\na=10; b=5\nlet sum=$a+$b\necho \"Sum: $sum\"\necho \"Multiply: $((a*b))\"\necho \"Division: $((a/b))\"\necho \"Mod: $((a%b))\"" },
        { id: "if-else", title: "10. if-elif-else", code: "#!/bin/bash\nread -p \"Enter marks: \" marks\nif [ \"$marks\" -ge 90 ]; then\n    echo \"Grade: A\"\nelif [ \"$marks\" -ge 80 ]; then\n    echo \"Grade: B\"\nelse\n    echo \"Grade: F\"\nfi" },
        { id: "multiple-conditions", title: "11. Multiple conditions (&&, ||)", code: "#!/bin/bash\nread -p \"Enter marks: \" marks\nif [ \"$marks\" -ge 90 ] && [ \"$marks\" -le 100 ]; then\n    echo \"Excellent\"\nelif [ \"$marks\" -ge 70 ] && [ \"$marks\" -lt 90 ]; then\n    echo \"Good\"\nelse\n    echo \"Needs improvement\"\nfi" },
        { id: "case-stmt", title: "12. case statement", code: "#!/bin/bash\necho \"a) date  b) calendar  c) hostname\"\nread -p \"Choice: \" choice\ncase $choice in\n    a) date ;;\n    b) cal ;;\n    c) hostname ;;\n    *) echo \"Invalid\";;\nesac" },
        { id: "logical-ops", title: "13. Logical operators", code: "#!/bin/bash\nage=20\nif [ \"$age\" -ge 18 ] && [ \"$age\" -lt 100 ]; then\n    echo \"Adult\"\nfi\ncountry=\"INDIA\"\nif [ \"$country\" = \"INDIA\" ] || [ \"$age\" -ge 18 ]; then\n    echo \"Eligible\"\nfi" },
        { id: "for-loop", title: "14. Loops (for/while/until)", code: "#!/bin/bash\nfor i in {1..5}; do echo \"Iter $i\"; done\ncount=1\nwhile [ $count -le 3 ]; do echo \"while: $count\"; ((count++)); done\ncounter=5\nuntil [ $counter -eq 0 ]; do echo \"until: $counter\"; ((counter--)); done" },
        { id: "file-iterate", title: "15. Read from file", code: "#!/bin/bash\n# iterate lines from file\nwhile read line; do\n    echo \"Line: $line\"\ndone < \"/etc/hostname\"\n# csv parsing\nwhile IFS=, read -r name age; do\n    echo \"Name: $name, Age: $age\"\ndone < \"data.csv\"" },
        { id: "array-loop", title: "16. Array in loops", code: "#!/bin/bash\nfruits=(\"apple\" \"banana\" \"mango\")\nfor (( i=0; i<${#fruits[@]}; i++ )); do\n    echo \"Element $i: ${fruits[i]}\"\ndone" },
        { id: "functions", title: "17. Functions & arguments", code: "#!/bin/bash\ngreet() {\n    echo \"Hello, $1\"\n}\ngreet \"pankaj\"\nadd() { echo $(( $1 + $2 )); }\nsum=$(add 10 20)\necho \"Sum: $sum\"" },
        { id: "shift-args", title: "18. Shifting arguments", code: "#!/bin/bash\nprocess_args() {\n    echo \"First arg: $1\"\n    shift\n    echo \"After shift: $1\"\n}\nprocess_args \"one\" \"two\"" },
        { id: "break-continue", title: "19. break / continue", code: "#!/bin/bash\nfor i in {1..5}; do\n    if [ $i -eq 3 ]; then continue; fi\n    if [ $i -eq 4 ]; then break; fi\n    echo \"Value: $i\"\ndone" },
        { id: "exit-status", title: "20. Exit status & /dev/null", code: "#!/bin/bash\nping -c 1 google.com &> /dev/null\nif [ $? -eq 0 ]; then\n    echo \"Reachable\"\nelse\n    echo \"Unreachable\"\nfi" },
        { id: "file-tests", title: "21. File checks (-f, -d, -x)", code: "#!/bin/bash\nread -p \"File path: \" file\nif [ -f \"$file\" ]; then\n    echo \"Regular file exists\"\nelif [ -d \"$file\" ]; then\n    echo \"Directory exists\"\nelse\n    echo \"Not found\"\nfi\n# also: -r readable, -w writable, -x executable" },
        { id: "heredoc", title: "22. Here Document (multiline)", code: "#!/bin/bash\ncat << EOF\nHello, this is a multiline text.\nYou can use variables like $HOME\nEOF\n# redirect to file:\ncat > output.txt << 'END'\nThis is literal text (no expansion).\nEND" },
        { id: "select-loop", title: "23. Select menu (interactive)", code: "#!/bin/bash\necho \"Pick an option:\"\nselect opt in \"Date\" \"Calendar\" \"Quit\"; do\n    case $opt in\n        \"Date\") date ;;\n        \"Calendar\") cal ;;\n        \"Quit\") break ;;\n        *) echo \"Invalid\";;\n    esac\ndone" },
        { id: "getopts", title: "24. Command line flags (getopts)", code: "#!/bin/bash\nwhile getopts \"u:a:\" flag; do\n    case $flag in\n        u) username=\"$OPTARG\" ;;\n        a) age=\"$OPTARG\" ;;\n        *) echo \"Usage: $0 -u name -a age\"; exit 1 ;;\n    esac\ndone\necho \"User: $username, Age: $age\"" },
        { id: "trap-signals", title: "25. Signal trapping (cleanup)", code: "#!/bin/bash\ncleanup() { echo \"Interrupt received, cleaning up...\"; exit 0; }\ntrap cleanup SIGINT SIGTERM\necho \"Running. Press Ctrl+C to trap.\"\nwhile true; do sleep 1; done" },
        { id: "background-jobs", title: "26. Background & nohup", code: "#!/bin/bash\nsleep 10 &\necho \"Background job with PID $!\"\nwait\necho \"Done\"\n# nohup ./longtask.sh &> output.log &" },
        { id: "cron-logger", title: "27. Logging / crontab basics", code: "#!/bin/bash\nlogger \"Script executed from ${0}\"\n# crontab examples:\n# * * * * * /home/user/backup.sh >> /var/log/backup.log 2>&1\n# @daily /path/to/script" },
        { id: "random-debug", title: "28. Random, debug, basename", code: "#!/bin/bash\necho \"Random: $((RANDOM % 100))\"\nset -x  # enable debug\nMYVAR=\"test\"\nset +x\necho \"Script name: $(basename $0)\"\necho \"Directory: $(dirname $0)\"" },
        { id: "root-check", title: "29. Root user check", code: "#!/bin/bash\nif [ $(id -u) -ne 0 ]; then\n    echo \"Please run as root\" >&2\n    exit 1\nelse\n    echo \"Root access confirmed\"\nfi" },
        { id: "infinite-loop", title: "30. Bonus: Infinite loop & break", code: "#!/bin/bash\nwhile true; do\n    read -p \"Enter number (exit to quit): \" input\n    if [[ \"$input\" == \"exit\" ]]; then\n        echo \"Bye!\"\n        break\n    fi\n    echo \"You typed: $input\"\ndone" },
        { id: "array-slicing", title: "31. Bonus: Array slicing & patterns", code: "#!/bin/bash\narr=(zero one two three four)\necho \"Slice 1-3: ${arr[@]:1:3}\"\n# replace pattern\necho \"Replace: ${arr[@]/two/TWO}\"" }
    ];

    const container = document.getElementById('sections-container');
    const navList = document.getElementById('navList');

    // Build all content cards
    function buildContent() {
        container.innerHTML = '';
        sectionsData.forEach(section => {
            const card = document.createElement('div');
            card.className = 'section-card';
            card.id = section.id;
            
            const headerEl = document.createElement('h2');
            headerEl.textContent = section.title;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'pre-wrapper';
            
            const preEl = document.createElement('pre');
            const codeEl = document.createElement('code');
            codeEl.textContent = section.code;
            preEl.appendChild(codeEl);
            wrapper.appendChild(preEl);
            
            card.appendChild(headerEl);
            card.appendChild(wrapper);
            container.appendChild(card);
        });
    }

    // Build sidebar navigation
    function buildSidebar() {
        navList.innerHTML = '';
        sectionsData.forEach((section, idx) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.textContent = section.title;
            a.setAttribute('data-id', section.id);
            
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const targetElement = document.getElementById(section.id);
                if (targetElement) {
                    targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    // Update active state
                    document.querySelectorAll('.nav-links a').forEach(link => {
                        link.classList.remove('active');
                    });
                    a.classList.add('active');
                    // Close sidebar on mobile after click
                    if (window.innerWidth <= 780) {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                }
            });
            
            li.appendChild(a);
            navList.appendChild(li);
        });
    }

    // Highlight active link based on scroll position
    function setActiveOnScroll() {
        const sections = sectionsData.map(s => document.getElementById(s.id)).filter(Boolean);
        const navLinks = document.querySelectorAll('.nav-links a');
        
        if (!sections.length) return;
        
        let currentActiveId = '';
        // Find which section is currently in view
        for (let i = 0; i < sections.length; i++) {
            const rect = sections[i].getBoundingClientRect();
            if (rect.top <= 200 && rect.bottom >= 100) {
                currentActiveId = sectionsData[i].id;
                break;
            }
        }
        
        // If none found, check the first section that is above viewport
        if (!currentActiveId) {
            for (let i = 0; i < sections.length; i++) {
                const rect = sections[i].getBoundingClientRect();
                if (rect.top <= 250) {
                    currentActiveId = sectionsData[i].id;
                    break;
                }
            }
        }
        
        navLinks.forEach((link, idx) => {
            const linkId = sectionsData[idx]?.id;
            if (linkId === currentActiveId) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }

    // Initialize everything
    function init() {
        buildContent();
        buildSidebar();
        
        // Set up scroll listener
        window.addEventListener('scroll', setActiveOnScroll);
        window.addEventListener('resize', () => {
            if (window.innerWidth > 780) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
        
        // Initial active highlight
        setTimeout(setActiveOnScroll, 100);
        
        // Mobile sidebar toggle
        const toggleBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('open');
            });
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 780 && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });
        
        // Handle anchor hash links from URL
        if (window.location.hash) {
            const targetId = window.location.hash.substring(1);
            const targetSection = document.getElementById(targetId);
            if (targetSection) {
                setTimeout(() => {
                    targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            }
        }
    }
    
    // Start the app
    init();
</script>
</body>
</html>
