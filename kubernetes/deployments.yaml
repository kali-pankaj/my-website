apiVersion: apps/v1
kind: Deployment
metadata:
  name: pankaj
  namespace: my-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
        - name: my-app
          image: kalitesthub/my-web-app:latest
          ports:
            - containerPort: 80