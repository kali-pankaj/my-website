apiVersion: apps/v1
kind: Deployment
metadata: 
  name: myapp-deployment
spec: 
  replicas: 2
  selector: 
    matchLabels: 
      app: myapp
  template: 
    metadata: 
      labels:
        app: myapp
    spec: 
      containers:
        - name: myapp 
          image: kalitesthub/my-web-app:v1.8
          imagePullPolicy: Always
          ports: 
            - containerPort: 80